<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <script>
      (function () {
        try {
          var storageKeys = ["theme", "financeos-theme", "financeos_theme", "color-theme"];
          var storedTheme = "";
          for (var i = 0; i < storageKeys.length; i += 1) {
            var next = localStorage.getItem(storageKeys[i]);
            if (next === "dark" || next === "light") {
              storedTheme = next;
              break;
            }
          }
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var shouldUseDark = storedTheme ? storedTheme === "dark" : prefersDark;
          document.documentElement.classList.toggle("dark", shouldUseDark);
          document.body.classList.toggle("dark", shouldUseDark);
        } catch (error) {}
      })();
    </script>
    <title>FinanceOS v2</title>
  </head>
  <body class="bg-brand-bg text-brand-text transition-colors duration-300 ease-in-out">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
